name: Publish Swift WebAssembly SDK

permissions:
    contents: write
on:
    workflow_dispatch:
        inputs:
            swift-release:
                description: 'swift toolchain release identifier'
                required: true
                type: string

jobs:
    build:
        uses: ./.github/workflows/Build.yml
        with:
            swift-release: ${{ inputs.swift-release }}

    publish:
        runs-on: ubuntu-24.04-arm
        needs: build
        steps:
            -   name: 💝 Checkout 💝
                uses: actions/checkout@v6

            -   name: 💝 Download 💝
                uses: actions/download-artifact@v7
                with:
                    name: swift-sdk-bundles
                    path: release-artifacts

            -   name: 💝 Generate notes 💝
                run: |
                    notes="notes.md"

                    echo "| Bundle | Checksum |" > "$notes"
                    echo "| ------ | -------- |" >> "$notes"

                    for zip in release-artifacts/*.zip; do
                        bundle="${zip%.artifactbundle.zip}"
                        checksum=$(sha256sum "$zip" | cut -d ' ' -f 1)

                        echo "| \`${bundle##*/}\` | \`${checksum}\` |" >> "$notes"
                    done

            -   name: 💝 Release 💝
                run: |
                    git config user.name "rarest automation"
                    git config user.email "automation@noreply.rarestype.com"

                    TAG="swift-${{ inputs.swift-release }}"

                    git tag -f "$TAG"
                    git push -f origin "$TAG"

                    gh release delete "$TAG" --cleanup-tag --yes || true
                    gh release create "$TAG" release-artifacts/*.zip \
                        --title "${{ inputs.swift-release }}" \
                        --notes-file notes.md
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
